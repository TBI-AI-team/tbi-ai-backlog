<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBI AI Team — Innovation Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root {
  --paars:    #630d80;
  --groen:    #c1e62e;
  --cta:      #a816d9;
  --blauw:    #1489cc;
  --lblauw:   #2fb2eb;
  --cyaan:    #26bdbd;
  --rood:     #f26457;
  --amber:    #ffae0d;
  --grijs1:   #404040;
  --grijs2:   #7a7a8a;
  --grijs3:   #cccccc;
  --grijs4:   #f0f0f5;
  --white:    #ffffff;
  --radius:   16px;
  --radius-sm:10px;
  --shadow:   0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:0 8px 32px rgba(99,13,128,.13), 0 2px 8px rgba(0,0,0,.08);
  --dur: 18000;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100vh;overflow:hidden;
  background:var(--grijs4);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Verdana,sans-serif;
  color:var(--grijs1);-webkit-font-smoothing:antialiased;}

/* ═══════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════ */
.header{
  position:fixed;top:22px;left:22px;right:22px;height:72px;
  background:rgba(255,255,255,.97);
  border-radius:20px;
  box-shadow:var(--shadow-lg);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;z-index:1000;
  border:1px solid rgba(99,13,128,.10);
}
.hdr-left{display:flex;align-items:center;gap:16px;}
.tbi-mark{
  background:var(--paars);color:var(--groen);
  width:46px;height:46px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:900;letter-spacing:1.5px;flex-shrink:0;
}
.hdr-sep{width:1px;height:32px;background:#e5e5ea;flex-shrink:0;}
.hdr-title{font-size:1.25rem;font-weight:800;color:var(--paars);letter-spacing:-.3px;line-height:1;}
.hdr-sub{font-size:.67rem;color:var(--grijs2);font-weight:500;margin-top:3px;
  display:flex;align-items:center;gap:7px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#34c759;
  animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* Nav pills */
.nav-pills{display:flex;gap:6px;}
.pill{
  padding:6px 15px;border-radius:20px;font-size:.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;cursor:pointer;
  border:1.5px solid transparent;transition:all .25s ease;
  color:var(--grijs2);background:var(--grijs4);user-select:none;
}
.pill.active{background:var(--paars);color:var(--groen);border-color:var(--paars);}
.pill:not(.active):hover{border-color:var(--paars);color:var(--paars);}

.hdr-right{text-align:right;flex-shrink:0;}
#clock{font-size:1.25rem;font-weight:800;color:var(--grijs1);font-variant-numeric:tabular-nums;}
.hdr-date{font-size:.65rem;color:var(--grijs2);margin-top:2px;font-weight:500;}

/* ═══════════════════════════════════════════════════════════
   MAIN + VIEWS
═══════════════════════════════════════════════════════════ */
.main{position:fixed;top:110px;left:22px;right:22px;bottom:22px;overflow:hidden;}
.view{
  position:absolute;inset:0;width:100%;height:100%;
  opacity:0;transform:translateY(14px) scale(.99);
  transition:opacity .55s cubic-bezier(.4,0,.2,1),
             transform .55s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.view.active{opacity:1;transform:translateY(0) scale(1);pointer-events:all;}

/* ═══════════════════════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════════════════════ */
.progress-wrap{
  position:fixed;bottom:8px;left:22px;right:22px;
  height:3px;background:rgba(99,13,128,.12);border-radius:2px;z-index:999;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--paars),var(--cta));
  border-radius:2px;width:0%;
}

/* ═══════════════════════════════════════════════════════════
   VIEW 1 — KAART (D3 SVG)
═══════════════════════════════════════════════════════════ */
#view-kaart{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg);position:relative;background:#d8ebf5;}
#nl-map{display:block;width:100%;height:100%;}
.prov{stroke:#7040a0;stroke-width:1.5;transition:fill .2s;}
.prov:hover{opacity:.85;}
.prov-lbl{font-size:9px;fill:#9060b0;font-weight:600;font-family:Verdana,sans-serif;
  pointer-events:none;text-anchor:middle;dominant-baseline:middle;}
.sea-label{font-size:11px;fill:#8ab8d4;font-weight:700;font-family:Verdana,sans-serif;letter-spacing:2px;}
/* Pin */
.pin-shadow{opacity:.18;}
.pin-circle{stroke:white;stroke-width:2.5;cursor:pointer;}
.pin-txt{fill:white;font-size:8.5px;font-weight:900;font-family:Verdana,sans-serif;
  text-anchor:middle;dominant-baseline:middle;pointer-events:none;}
.pin-badge{fill:#c1e62e;stroke:white;stroke-width:1.5;}
.pin-badge-txt{font-size:7px;font-weight:900;font-family:Verdana,sans-serif;
  text-anchor:middle;dominant-baseline:middle;pointer-events:none;fill:#404040;}
/* Tooltip */
#map-tt{
  position:absolute;background:white;border-radius:14px;
  padding:13px 16px;box-shadow:0 8px 28px rgba(0,0,0,.18);
  min-width:210px;pointer-events:none;opacity:0;
  transition:opacity .2s ease;z-index:600;
}
.tt-sector{font-size:.58rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.8px;padding:2px 8px;border-radius:5px;color:white;display:inline-block;margin-bottom:6px;}
.tt-name{font-size:.95rem;font-weight:800;color:var(--grijs1);margin-bottom:7px;}
.tt-proj{display:flex;align-items:center;gap:7px;padding:4px 0;
  border-bottom:1px solid #f2f2f7;font-size:.73rem;color:var(--grijs1);}
.tt-proj:last-child{border-bottom:none;padding-bottom:0;}
.tt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

.map-overlay{position:absolute;z-index:500;}
.map-legend{
  bottom:20px;left:20px;
  background:rgba(255,255,255,.97);border-radius:14px;
  padding:14px 16px;box-shadow:var(--shadow);min-width:150px;
}
.legend-title{
  font-size:.62rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.6px;color:var(--paars);margin-bottom:9px;
}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;
  font-size:.72rem;font-weight:500;color:var(--grijs1);}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-sep{height:1px;background:#f0f0f5;margin:8px 0;}
.map-stats{top:20px;right:20px;display:flex;flex-direction:column;gap:8px;}
.map-stat{
  background:rgba(255,255,255,.97);border-radius:12px;
  padding:12px 16px;text-align:center;box-shadow:var(--shadow);min-width:110px;
}
.map-stat-n{font-size:2rem;font-weight:900;color:var(--paars);line-height:1;}
.map-stat-l{font-size:.6rem;color:var(--grijs2);font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* ═══════════════════════════════════════════════════════════
   VIEW 2 — PIPELINE
═══════════════════════════════════════════════════════════ */
#view-pipeline{display:flex;flex-direction:column;gap:12px;}
.pipe-heads{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.pipe-head{
  background:var(--white);border-radius:var(--radius-sm);
  padding:13px 16px;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:space-between;
}
.ph-left .ph-label{font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
.ph-left .ph-desc{font-size:.62rem;color:var(--grijs2);font-weight:500;margin-top:2px;}
.ph-count{font-size:1.6rem;font-weight:900;line-height:1;}

.pipe-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex:1;overflow:hidden;}
.pipe-col{
  border-radius:14px;padding:10px;
  display:flex;flex-direction:column;gap:7px;
  overflow-y:auto;overflow-x:hidden;
}
.pipe-col::-webkit-scrollbar{width:0;}

.proj-card{
  background:var(--white);border-radius:10px;padding:11px 13px;
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  border-left:3.5px solid var(--paars);
  transition:transform .2s ease,box-shadow .2s ease;cursor:default;
}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(99,13,128,.12);}
.pc-co{font-size:.58rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.5px;color:var(--grijs2);margin-bottom:2px;}
.pc-title{font-size:.83rem;font-weight:700;color:var(--grijs1);line-height:1.3;margin-bottom:5px;}
.pc-foot{display:flex;align-items:center;justify-content:space-between;}
.pc-tag{font-size:.6rem;font-weight:700;color:white;
  padding:2px 7px;border-radius:4px;display:inline-block;}
.pc-impact{display:flex;gap:2px;align-items:center;}
.idot{width:5px;height:5px;border-radius:50%;background:var(--grijs3);}
.idot.on{background:var(--groen);}

/* ═══════════════════════════════════════════════════════════
   VIEW 3 — BACKLOG
═══════════════════════════════════════════════════════════ */
#view-backlog{overflow:hidden;}
.bl-wrap{
  position:absolute;inset:0;
  overflow-y:scroll;overflow-x:hidden;
  scrollbar-width:none;
}
.bl-wrap::-webkit-scrollbar{display:none;}
.bl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding-bottom:30px;}

.bl-card{
  background:var(--white);border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);
  transition:transform .3s ease,box-shadow .3s ease;
}
.bl-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.bl-top{padding:14px 16px 11px;border-bottom:1px solid #f2f2f7;}
.bl-header{display:flex;align-items:flex-start;justify-content:space-between;
  gap:8px;margin-bottom:5px;}
.bl-co{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.bl-title{font-size:.93rem;font-weight:800;color:var(--grijs1);line-height:1.3;margin-bottom:2px;}
.bl-sub{font-size:.7rem;color:var(--grijs2);font-weight:500;}

.sbadge{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  padding:3px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.sbadge.discover{background:rgba(255,174,13,.12);color:#a06800;}
.sbadge.experiment{background:rgba(242,100,87,.12);color:#b83525;}
.sbadge.scale{background:rgba(20,137,204,.12);color:var(--blauw);}
.sbadge.operate{background:rgba(52,199,89,.10);color:#1e8c3a;}

.bl-bottom{padding:10px 16px 14px;display:flex;align-items:flex-end;gap:10px;}
.bl-desc{
  font-size:.72rem;color:var(--grijs1);line-height:1.55;opacity:.82;flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.bl-impact{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.bl-impact-bar{height:40px;width:5px;background:var(--grijs4);border-radius:3px;overflow:hidden;
  display:flex;align-items:flex-end;}
.bl-impact-fill{width:100%;border-radius:3px;transition:height .5s ease;}
.bl-impact-label{font-size:.52rem;color:var(--grijs2);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}

/* ═══════════════════════════════════════════════════════════
   VIEW 4 — KPI
═══════════════════════════════════════════════════════════ */
#view-kpi{display:flex;flex-direction:column;gap:12px;}
.kpi-top{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kpi-card{
  background:var(--white);border-radius:var(--radius);
  padding:26px 22px;box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.kpi-card::before{
  content:'';position:absolute;top:-20px;right:-20px;
  width:90px;height:90px;border-radius:50%;
  background:var(--paars);opacity:.05;
}
.kpi-icon{font-size:1.6rem;margin-bottom:10px;display:block;}
.kpi-n{font-size:3.2rem;font-weight:900;color:var(--paars);line-height:1;
  letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.kpi-label{font-size:.78rem;font-weight:700;color:var(--grijs1);margin-top:5px;
  text-transform:uppercase;letter-spacing:.4px;}
.kpi-sub{font-size:.68rem;color:var(--grijs2);margin-top:3px;font-weight:500;}
.kpi-delta{
  margin-top:10px;display:inline-flex;align-items:center;gap:5px;
  font-size:.68rem;font-weight:700;
  background:rgba(52,199,89,.1);color:#1e8c3a;
  padding:3px 9px;border-radius:8px;
}

.kpi-mid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.phase-bar-card{
  background:var(--white);border-radius:var(--radius);
  padding:18px 18px 16px;box-shadow:var(--shadow);
}
.phase-bar-title{font-size:.65rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:10px;}
.phase-bar-track{height:6px;background:var(--grijs4);border-radius:3px;overflow:hidden;margin-bottom:8px;}
.phase-bar-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.phase-bar-bottom{display:flex;justify-content:space-between;align-items:baseline;}
.phase-bar-count{font-size:1.6rem;font-weight:900;line-height:1;}
.phase-bar-label{font-size:.62rem;color:var(--grijs2);font-weight:600;}

.kpi-bottom{
  background:var(--white);border-radius:var(--radius);
  padding:18px 22px;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:space-between;
}
.kpi-bottom-title{font-size:.65rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.5px;color:var(--paars);margin-bottom:8px;}
.sector-pills{display:flex;gap:8px;flex-wrap:wrap;}
.sector-pill{
  padding:5px 12px;border-radius:20px;font-size:.7rem;font-weight:700;
  display:flex;align-items:center;gap:6px;
}
.sector-count{font-size:.8rem;font-weight:900;}
.aci-badge{
  background:linear-gradient(135deg,var(--paars),var(--cta));
  color:white;padding:10px 20px;border-radius:12px;
  text-align:center;
}
.aci-badge-title{font-size:.62rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.6px;opacity:.8;margin-bottom:4px;}
.aci-badge-main{font-size:1.1rem;font-weight:900;letter-spacing:-.2px;}
/* ═══════════════════════════════════════════════════════════
   DETAIL PANEEL
═══════════════════════════════════════════════════════════ */
#detail-panel{
  position:fixed;top:0;right:0;width:420px;height:100vh;
  background:var(--white);
  box-shadow:-8px 0 40px rgba(99,13,128,.15);
  z-index:2000;
  transform:translateX(420px);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#detail-panel.open{transform:translateX(0);}
.dp-header{
  padding:20px 22px 16px;
  border-bottom:1px solid #f0f0f5;
  flex-shrink:0;
}
.dp-close{
  position:absolute;top:16px;right:18px;
  width:32px;height:32px;border-radius:50%;
  background:var(--grijs4);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;color:var(--grijs2);
  transition:background .2s;
}
.dp-close:hover{background:#e0e0e8;}
.dp-sector{font-size:.58rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.8px;padding:3px 9px;border-radius:6px;
  color:white;display:inline-block;margin-bottom:8px;}
.dp-titel{font-size:1.1rem;font-weight:900;color:var(--grijs1);
  line-height:1.3;margin-bottom:4px;}
.dp-sub{font-size:.72rem;color:var(--grijs2);font-weight:500;}
.dp-body{flex:1;overflow-y:auto;padding:18px 22px;scrollbar-width:none;}
.dp-body::-webkit-scrollbar{display:none;}
.dp-section{margin-bottom:18px;}
.dp-section-title{
  font-size:.6rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.6px;color:var(--paars);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.dp-section-title::after{content:'';flex:1;height:1px;background:#f0f0f5;}
.dp-field{margin-bottom:10px;}
.dp-field-label{font-size:.62rem;font-weight:700;color:var(--grijs2);
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.dp-field-value{font-size:.80rem;color:var(--grijs1);line-height:1.55;}
.dp-fase-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  font-size:.72rem;font-weight:700;
}
.dp-impact{display:flex;gap:3px;margin-top:3px;}
.dp-star{font-size:.9rem;}
.dp-criteria{display:flex;flex-direction:column;gap:5px;}
.dp-crit{
  display:flex;align-items:flex-start;gap:8px;
  font-size:.72rem;color:var(--grijs1);line-height:1.4;
  padding:6px 10px;border-radius:8px;background:var(--grijs4);
}
.dp-crit-icon{font-size:.85rem;flex-shrink:0;margin-top:1px;}
.dp-footer{
  padding:16px 22px;border-top:1px solid #f0f0f5;
  display:flex;gap:10px;flex-shrink:0;
}
.dp-btn{
  flex:1;padding:11px 16px;border-radius:10px;border:none;
  font-size:.78rem;font-weight:700;cursor:pointer;
  transition:all .2s ease;display:flex;align-items:center;
  justify-content:center;gap:6px;
}
.dp-btn-primary{background:var(--paars);color:var(--groen);}
.dp-btn-primary:hover{background:#4a0960;}
.dp-btn-secondary{background:var(--grijs4);color:var(--grijs1);}
.dp-btn-secondary:hover{background:#e0e0e8;}
#detail-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.25);
  z-index:1999;opacity:0;pointer-events:none;
  transition:opacity .35s ease;
}
#detail-overlay.open{opacity:1;pointer-events:all;}


<!-- ═══ HEADER ═══════════════════════════════════════════════ -->

<!-- Detail paneel -->
<div id="detail-overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <div class="dp-header">
    <button class="dp-close" onclick="closeDetail()">✕</button>
    <span class="dp-sector" id="dp-sector"></span>
    <div class="dp-titel" id="dp-titel"></div>
    <div class="dp-sub" id="dp-sub"></div>
  </div>
  <div class="dp-body" id="dp-body"></div>
  <div class="dp-footer">
    <button class="dp-btn dp-btn-primary" id="dp-github-btn" onclick="openGithub()">
      🔗 Open op GitHub
    </button>
    <button class="dp-btn dp-btn-secondary" onclick="closeDetail()">Sluiten</button>
  </div>
</div>

<header class="header">
  <div class="hdr-left">
    <div class="tbi-mark">TBI</div>
    <div class="hdr-sep"></div>
    <div>
      <div class="hdr-title">AI Team — Innovation Dashboard</div>
      <div class="hdr-sub">
        <span class="live-dot"></span>
        SparkOptimus AI Strategie v2.0 &nbsp;·&nbsp; 13 TBI-brede initiatieven &nbsp;·&nbsp; EBIT +€5.1–7.7M/jr &nbsp;·&nbsp; roadmap 2026–2028
      </div>
    </div>
  </div>

  <div class="nav-pills" id="nav-pills">
    <div class="pill active" data-view="0">Kaart</div>
    <div class="pill" data-view="1">Pipeline</div>
    <div class="pill" data-view="2">Backlog</div>
    <div class="pill" data-view="3">KPI's</div>
  </div>

  <div class="hdr-right">
    <div id="clock">00:00:00</div>
    <div class="hdr-date" id="datum"></div>
  </div>
</header>

<!-- ═══ MAIN ════════════════════════════════════════════════ -->
<main class="main">

  <!-- VIEW 1: KAART -->
  <div class="view active" id="view-kaart">
    <svg id="nl-map"></svg>
    <div id="map-tt"></div>
    <div class="map-overlay map-legend">
      <div class="legend-title">Sector</div>
      <div class="legend-item"><div class="ldot" style="background:#630d80"></div>Techniek</div>
      <div class="legend-item"><div class="ldot" style="background:#2a8a2a"></div>Bouw &amp; Ontwikkeling</div>
      <div class="legend-item"><div class="ldot" style="background:#1489cc"></div>Infra</div>
      <div class="legend-item"><div class="ldot" style="background:#404040"></div>Holding / SSC ICT</div>
      <div class="legend-sep"></div>
      <div class="legend-title">Rijpheid</div>
      <div class="legend-item"><div class="ldot" style="background:#ffae0d"></div>Discover</div>
      <div class="legend-item"><div class="ldot" style="background:#f26457"></div>Experiment</div>

function openGithub() {

function goTo(idx) {
  if(rotTimer) clearTimeout(rotTimer);
  if(progRAF) cancelAnimationFrame(progRAF);
  views[cur].classList.remove('active');
  pills[cur].classList.remove('active');
  cur = ((idx % views.length) + views.length) % views.length;
  views[cur].classList.add('active');
  pills[cur].classList.add('active');
  if(cur === 0 && !mapInited){ setTimeout(initMap, 100); mapInited=true; }
  prog.style.transition='none'; prog.style.width='0%';
  progStart = performance.now();
  (function tick(){
    const pct = Math.min((performance.now()-progStart)/VIEW_DUR*100,100);
    prog.style.width = pct+'%';
    if(pct<100) progRAF=requestAnimationFrame(tick);
  })();
  rotTimer = setTimeout(()=>goTo(cur+1), VIEW_DUR);
}

pills.forEach((p,i) => p.addEventListener('click', ()=>goTo(i)));

function drawPins(proj, tt, svg) {
  BEDRIJVEN.forEach(b => {
    const [px, py] = proj([b.lng, b.lat]);
    const col  = SECTOR_C[b.sector];
    const abbr = b.bedrijf.split(/[\s&]+/).map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const g = svg.append('g').attr('transform',`translate(${px},${py})`);

    // Drop shadow
    g.append('circle').attr('r',17).attr('class','pin-shadow')
      .attr('fill',col).attr('transform','translate(1.5,2)');
    // Main circle
    g.append('circle').attr('r',14).attr('class','pin-circle').attr('fill',col);
    // Text
    g.append('text').attr('class','pin-txt').text(abbr);
    // Badge: project count
    if(b.projecten.length > 1){
      g.append('circle').attr('class','pin-badge').attr('cx',11).attr('cy',-11).attr('r',7);
      g.append('text').attr('class','pin-badge-txt').attr('x',11).attr('y',-11)
        .text(b.projecten.length);
    }
    // Tooltip + click
    g.style('cursor','pointer')
      .on('mouseover', function(event){
        if(b.projecten.length === 1) return; // single project: skip tooltip, use click
        const pHTML = b.projecten.map(p=>`
          <div class="tt-proj">
            <div class="tt-dot" style="background:${SC[p.status]?.dot||'#630d80'}"></div>
            <span>${p.titel}</span>
          </div>`).join('');
        tt.innerHTML=`<span class="tt-sector" style="background:${col}">${b.sector}</span>
          <div class="tt-name">${b.bedrijf}</div>${pHTML}
          <div style="font-size:.6rem;color:#888;margin-top:6px;text-align:center">Klik om te openen</div>`;
        const r = document.getElementById('view-kaart').getBoundingClientRect();
        tt.style.left = (event.clientX - r.left + 16)+'px';
        tt.style.top  = Math.max(10, event.clientY - r.top - 30)+'px';
        tt.style.opacity='1';
      })
      .on('mouseout', ()=>{ tt.style.opacity='0'; })
      .on('click', function(){
        tt.style.opacity='0';
        // Als meerdere projecten: open het eerste, gebruiker kan dan via GitHub de rest zien
        openDetail(b.projecten[0]);
      });
  });
}

(function buildPipeline(){
  const heads = document.getElementById('pipe-heads');
  const cols = document.getElementById('pipe-cols');
  STAGES.forEach(stage=>{
    const sc = SC[stage];
    const ps = PROJECTS.filter(p=>p.status===stage);
    // head
    const h = document.createElement('div');
    h.className='pipe-head';
    h.style.borderTop=`3px solid ${sc.border}`;
    h.innerHTML=`<div class="ph-left">
      <div class="ph-label" style="color:${sc.text}">${stage}</div>
      <div class="ph-desc">${STAGE_DESCS[stage]}</div>
    </div>
    <div class="ph-count" style="color:${sc.text}">${ps.length}</div>`;
    heads.appendChild(h);
    // col
    const col = document.createElement('div');
    col.className='pipe-col';
    col.style.cssText=`border:1.5px solid ${sc.border}20;background:${sc.bg};`;
    ps.forEach(p=>{
      const sc2 = SECTOR_C[p.sector];
      const dots = Array.from({length:5},(_,i)=>`<div class="idot${i<p.impact?' on':''}"></div>`).join('');
      const card = document.createElement('div');
      card.className='proj-card';
      card.style.borderLeftColor=sc2;
      card.style.cursor='pointer';
      card.innerHTML=`<div class="pc-co">${p.bedrijf}</div>
        <div class="pc-title">${p.titel}</div>
        <div class="pc-foot">
          <span class="pc-tag" style="background:${sc2}">${p.domein}</span>
          <div class="pc-impact">${dots}</div>
        </div>`;
      card.addEventListener('click', ()=>openDetail(p));
      col.appendChild(card);
    });
    cols.appendChild(col);
  });
})();

(function buildBacklog(){
  const grid = document.getElementById('bl-grid');
  PROJECTS.forEach(p=>{
    const sc = SECTOR_C[p.sector];
    const statusClass = p.status.toLowerCase();
    const impactPct = (p.impact/5)*100;
    const card = document.createElement('div');
    card.className='bl-card';
    card.style.cursor='pointer';
    card.innerHTML=`<div class="bl-top">
      <div class="bl-header">
        <div class="bl-co" style="color:${sc}">${p.bedrijf}</div>
        <span class="sbadge ${statusClass}">${p.status}</span>
      </div>
      <div class="bl-title">${p.titel}</div>
      <div class="bl-sub">${p.sub}</div>
    </div>
    <div class="bl-bottom">
      <div class="bl-desc">${p.desc}</div>
      <div class="bl-impact">
        <div class="bl-impact-bar">
          <div class="bl-impact-fill" style="height:${impactPct}%;background:${sc}"></div>
        </div>
        <div class="bl-impact-label">Impact</div>
      </div>
    </div>`;
    card.addEventListener('click', ()=>openDetail(p));
    grid.appendChild(card);
  });

  // Auto-scroll
  const wrap = document.getElementById('bl-wrap');
  setInterval(()=>{
    if(cur!==2) return;
    const max = wrap.scrollHeight - wrap.clientHeight;
    if(max<=0) return;
    blScrollPos += 0.6;
    if(blScrollPos > max) blScrollPos = 0;
    wrap.scrollTop = blScrollPos;
  }, 16);
})();

(function buildKPI(){
  const top = document.getElementById('kpi-top');
  const mid = document.getElementById('kpi-mid');
  const bot = document.getElementById('kpi-bottom');

  const kpis = [
    {n:21, label:'TBI-bedrijven', sub:'Betrokken in AI-programma', icon:'🏢', delta:'+3 dit kwartaal'},
    {n:PROJECTS.length, label:'AI-projecten', sub:'In de portfolio', icon:'🚀', delta:'+4 dit kwartaal'},
    {n:PROJECTS.filter(p=>['Scale','Operate'].includes(p.status)).length,
      label:'In Productie', sub:'Scale + Operate fase', icon:'⚡', delta:'2× vs vorig jaar'},
    {n:Math.round(PROJECTS.filter(p=>p.impact>=4).length/PROJECTS.length*100),
      label:'Hoog Impact', sub:'Score 4 of hoger (%)', icon:'🎯', delta:`${PROJECTS.filter(p=>p.impact>=4).length} projecten`},
  ];

  kpis.forEach(k=>{
    const el = document.createElement('div');
    el.className='kpi-card';
    el.innerHTML=`<span class="kpi-icon">${k.icon}</span>
      <div class="kpi-n" data-target="${k.n}">0</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-sub">${k.sub}</div>
      <div class="kpi-delta">↑ ${k.delta}</div>`;
    top.appendChild(el);
  });

  // Phase bars
  const phases = [
    {stage:'Discover',   color:SC.Discover.dot},
    {stage:'Experiment', color:SC.Experiment.dot},
    {stage:'Scale',      color:SC.Scale.dot},
    {stage:'Operate',    color:SC.Operate.dot},
  ];
  const totalP = PROJECTS.length;
  phases.forEach(ph=>{
    const cnt = PROJECTS.filter(p=>p.status===ph.stage).length;
    const pct = Math.round(cnt/totalP*100);
    const el = document.createElement('div');
    el.className='phase-bar-card';
    el.innerHTML=`<div class="phase-bar-title" style="color:${ph.color}">${ph.stage}</div>
      <div class="phase-bar-track">
        <div class="phase-bar-fill" style="width:${pct}%;background:${ph.color}"></div>
      </div>
      <div class="phase-bar-bottom">
        <div class="phase-bar-count" style="color:${ph.color}">${cnt}</div>
        <div class="phase-bar-label">${pct}% van portfolio</div>
      </div>`;
    mid.appendChild(el);
  });

  // Bottom strip
  const sectors = ['TECHNIEK','BOUW','INFRA','HOLDING'];
  const sDiv = document.createElement('div');
  sDiv.innerHTML=`<div class="kpi-bottom-title">Verdeling per sector</div>
    <div class="sector-pills">${sectors.map(s=>{
      const cnt = PROJECTS.filter(p=>p.sector===s).length;
      const c = SECTOR_C[s];
      const tc = s==='BOUW' ? c : c;
      return `<div class="sector-pill" style="background:${c}10;border:1.5px solid ${c}30">
        <div class="ldot" style="background:${c}"></div>
        <span style="font-size:.7rem;font-weight:700;color:${c}">${s}</span>
        <span class="sector-count" style="color:${c}">${cnt}</span>
      </div>`;
    }).join('')}</div>`;
  bot.appendChild(sDiv);

  const aci = document.createElement('div');
  aci.className='aci-badge';
  aci.innerHTML=`<div class="aci-badge-title">Strategie</div>
    <div class="aci-badge-main">Augmented Collective Intelligence</div>
    <div class="aci-badge-sub">AI als activator van humaan kapitaal · TBI 2025</div>`;
  bot.appendChild(aci);

  // Animate counters when view 3 becomes active
  function animCounters(){
    top.querySelectorAll('[data-target]').forEach(el=>{
      const target = parseInt(el.dataset.target);
      let cur2=0; const step=Math.max(1,Math.ceil(target/30));
      const iv=setInterval(()=>{
        cur2=Math.min(cur2+step,target);
        el.textContent=cur2+(el.parentElement.querySelector('.kpi-label').textContent==='Hoog Impact'?'%':'');
        if(cur2>=target) clearInterval(iv);
      },40);
    });
  }
  // Trigger on first view of KPI
  let kpiAnimated=false;
  const kpiObs=new MutationObserver(()=>{
    if(views[3].classList.contains('active')&&!kpiAnimated){
      kpiAnimated=true; animCounters();
    }
  });
  kpiObs.observe(views[3],{attributes:true,attributeFilter:['class']});
})();
