name: 🤖 Issue pipeline → dashboard

on:
  issues:
    types: [opened, closed, labeled, unlabeled, edited]
  schedule:
    - cron: '0 6 * * *'   # Dagelijks om 06:00 UTC (08:00 NL tijd)
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  issues: write
  contents: write
  pages: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # JOB 1 — auto-label
  # Draait alleen op issues:opened en issues:edited. Past labels, milestone
  # en welkomscomment toe op het zojuist gewijzigde issue.
  # ════════════════════════════════════════════════════════════════════════
  auto-label:
    name: Label en triage nieuw initiatief
    if: github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'edited')
    runs-on: ubuntu-latest

    steps:
      - name: "🔍 Parse issue body"
        id: parse
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.issue.body || '';

            function extractField(body, label) {
              const regex = new RegExp(
                '(?:^|\\n)###\\s+' + label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?=\\s|\\(|$|\\n)[^\\n]*\\n+([\\s\\S]*?)(?=\\n###|\\n---|$)',
                'i'
              );
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            const bedrijf     = extractField(body, 'TBI Bedrijf');
            const sector      = extractField(body, 'Sector');
            const fase        = extractField(body, 'PMC Startfase');
            const domein      = extractField(body, 'Primair domein');
            const impact      = extractField(body, 'Verwachte impact');
            const strategie   = extractField(body, 'Aansluiting bij TBI AI Strategie');
            const verandering = extractField(body, 'Verwachte veranderingsbereidheid');
            const financiering= extractField(body, 'Financiering');

            let faseLabel = 'fase: Idee';
            let faseKleur = 'paars';
            if      (fase.includes('Fase 2') || fase.includes('Prototype'))    { faseLabel = 'fase: Prototype';    faseKleur = 'paars'; }
            else if (fase.includes('Fase 3') || fase.includes('Pilots'))       { faseLabel = 'fase: Pilots';       faseKleur = 'teal'; }
            else if (fase.includes('Fase 4') || fase.includes('Go-to-Market')) { faseLabel = 'fase: Go-to-Market'; faseKleur = 'groen'; }
            else if (fase.includes('Fase 5') || fase.includes('Scale-Up'))     { faseLabel = 'fase: Scale-Up';     faseKleur = 'groen'; }

            let sectorLabel = 'sector: OVERIG';
            if      (sector.includes('TECHNIEK')) sectorLabel = 'sector: TECHNIEK';
            else if (sector.includes('BOUW'))     sectorLabel = 'sector: BOUW';
            else if (sector.includes('INFRA'))    sectorLabel = 'sector: INFRA';
            else if (sector.includes('HOLDING'))  sectorLabel = 'sector: HOLDING';

            const impactNum   = (impact.match(/^(\d)/) || ['','3'])[1];
            const impactLabel = 'impact: ' + impactNum;

            let aciLabel = 'aci: assistent';
            if      (strategie.includes('fase 2')) aciLabel = 'aci: digitale collega';
            else if (strategie.includes('fase 3')) aciLabel = 'aci: agent';

            let veranderingLabel = 'verandering: gemiddeld';
            if      (verandering.includes('Hoog')) veranderingLabel = 'verandering: hoog';
            else if (verandering.includes('Laag')) veranderingLabel = 'verandering: laag';

            let finLabel = 'financiering: holding-fonds';
            if      (financiering.includes('Co-financiering')) finLabel = 'financiering: co-financiering';
            else if (financiering.includes('primair'))         finLabel = 'financiering: bedrijf-primair';
            else if (financiering.includes('Volledig'))        finLabel = 'financiering: volledig-bedrijf';

            const labels = [
              bedrijf ? ('bedrijf: ' + bedrijf) : null,
              sectorLabel,
              faseLabel,
              ('kleur: ' + faseKleur),
              finLabel,
              impactLabel,
              aciLabel,
              veranderingLabel,
              domein ? ('domein: ' + domein.split(' &')[0].split(' —')[0].toLowerCase()) : null,
            ].filter(Boolean);

            core.setOutput('labels', JSON.stringify(labels));
            core.setOutput('fase', faseLabel);
            core.setOutput('bedrijf', bedrijf);
            core.setOutput('impact_num', impactNum);

      - name: "🏷️ Apply labels"
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = JSON.parse('${{ steps.parse.outputs.labels }}');

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
              } catch (e) {
                const color = getLabelColor(label);
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label, color: color });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: labels,
            });

            function getLabelColor(label) {
              if (label.startsWith('bedrijf:'))            return '630d80';
              if (label.startsWith('sector:'))             return '7a9015';
              if (label === 'fase: Idee')                  return '630d80';
              if (label === 'fase: Prototype')             return '7a3596';
              if (label === 'fase: Pilots')                return '1d7a6e';
              if (label === 'fase: Go-to-Market')          return '2a7a1a';
              if (label === 'fase: Scale-Up')              return '3a9020';
              if (label === 'kleur: paars')                return '630d80';
              if (label === 'kleur: teal')                 return '1d7a6e';
              if (label === 'kleur: groen')                return '3a9020';
              if (label.startsWith('financiering:'))       return '534AB7';
              if (label.startsWith('impact:'))             return 'f26457';
              if (label.startsWith('aci:'))                return 'a816d9';
              if (label.startsWith('domein:'))             return '26bdbd';
              if (label.startsWith('verandering:'))        return 'ffae0d';
              if (label.startsWith('status:'))             return '768694';
              return 'cccccc';
            }

      - name: "📅 Assign quarterly milestone"
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now   = new Date();
            const year  = now.getFullYear();
            const q     = Math.floor(now.getMonth() / 3) + 1;
            const title = 'Q' + q + ' ' + year;

            const { data: milestones } = await github.rest.issues.listMilestones({ owner: context.repo.owner, repo: context.repo.repo, state: 'open' });
            let milestone = milestones.find(m => m.title === title);

            if (!milestone) {
              const dueMonth = q * 3 - 1;
              const dueDate  = new Date(year, dueMonth + 1, 0);
              const { data } = await github.rest.issues.createMilestone({ owner: context.repo.owner, repo: context.repo.repo, title: title, due_on: dueDate.toISOString() });
              milestone = data;
            }

            await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.issue.number, milestone: milestone.number });

      - name: "💬 Post triage comment"
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fase    = '${{ steps.parse.outputs.fase }}';
            const bedrijf = '${{ steps.parse.outputs.bedrijf }}';
            const impact  = '${{ steps.parse.outputs.impact_num }}';
            const emoji   = { 'fase: Idee': '🔍', 'fase: Prototype': '🧪', 'fase: Pilots': '🚀', 'fase: Go-to-Market': '📈', 'fase: Scale-Up': '⚡' }[fase] || '📋';
            const stars   = '⭐'.repeat(parseInt(impact) || 3);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '## ' + emoji + ' Initiatief ontvangen\n\n**Bedrijf:** ' + bedrijf + '\n**Fase:** ' + fase.replace('fase: ','') + '\n**Impact:** ' + stars + '\n\n---\n\n### Volgende stappen\n\n| Stap | Actie |\n|------|-------|\n| 1 | Review door TBI AI team (5 werkdagen) |\n| 2 | Intake gesprek eigenaar + ambassadeur |\n| 3 | GO / NO GO beslissing |\n| 4 | Opname in sprint backlog |\n\n> Vragen? Mail [ai-team@tbi.nl](mailto:ai-team@tbi.nl)',
            });

  # ════════════════════════════════════════════════════════════════════════
  # JOB 2 — update-dashboard
  # Draait sequentieel na auto-label (of standalone bij schedule/push/etc).
  # Geen race meer met label-toepassing: needs:auto-label garandeert dat
  # de labels al staan voordat de issue-API wordt opgevraagd.
  # ════════════════════════════════════════════════════════════════════════
  update-dashboard:
    name: Genereer dashboard data
    needs: auto-label
    if: always() && (needs.auto-label.result == 'success' || needs.auto-label.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 📥 Fetch alle open initiatieven via API
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        id: fetch-issues
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const allIssues = [];
            let page = 1;

            while (true) {
              const { data } = await github.rest.issues.listForRepo({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                state:    'all',
                per_page: 100,
                page:     page,
              });
              if (data.length === 0) break;
              allIssues.push(...data);
              page++;
            }

            // ── Helper: parse form field uit issue body ────────────────────
            function parseField(body, label) {
              const regex = new RegExp(
                `(?:^|\\n)###\\s+${label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}(?=\\s|\\(|\$|\\n)[^\\n]*\\n+([\\s\\S]*?)(?=\\n###|\\n---|\$)`,
                'i'
              );
              const m = (body || '').match(regex);
              return m ? m[1].trim().split('\n')[0] : '';
            }

            function getLabel(issue, prefix) {
              const lbl = issue.labels.find(l => l.name.startsWith(prefix + ': '));
              return lbl ? lbl.name.replace(prefix + ': ', '') : '';
            }

            // ── Verwerk alle issues ────────────────────────────────────────
            const projects = allIssues
              .filter(i => !i.pull_request)
              .map(issue => {
                const body       = issue.body || '';
                const bedrijf    = parseField(body, 'TBI Bedrijf')   || getLabel(issue, 'bedrijf');
                const sector     = parseField(body, 'Sector')        || getLabel(issue, 'sector');
                const fase       = getLabel(issue, 'fase')           || parseField(body, 'PMC Startfase').split(' —')[0];
                const domein     = getLabel(issue, 'domein')         || parseField(body, 'Primair domein').split(' &')[0];
                const impactRaw  = getLabel(issue, 'impact')        || parseField(body, 'Verwachte impact');
                const impact     = parseInt(impactRaw) || 3;
                const titel      = issue.title.replace(/^\[INITIATIEF\]\s*/i, '').split(' — ')[0].trim();
                const sub        = parseField(body, 'Primair domein');
                const desc       = parseField(body, 'Algemene omschrijving').substring(0, 180);
                const locatie    = parseField(body, 'Locatie hoofdkantoor');
                const status     = issue.state === 'closed' ? 'Operate' : (fase || 'Discover');
                const milestone  = issue.milestone?.title || '';

                return {
                  id:         issue.number,
                  titel,
                  sub,
                  bedrijf,
                  sector:     sector.replace('sector: ', '').toUpperCase().split(' &')[0].trim() || 'OVERIG',
                  status,
                  domein,
                  impact,
                  desc,
                  locatie,
                  milestone,
                  url:        issue.html_url,
                  created_at: issue.created_at,
                  updated_at: issue.updated_at,
                  labels:     issue.labels.map(l => l.name),
                  closed:     issue.state === 'closed',
                };
              });

            // ── Schrijf naar JSON ──────────────────────────────────────────
            const fs    = require('fs');
            const stats = {
              total:      projects.length,
              open:       projects.filter(p => !p.closed).length,
              by_fase:    {},
              by_sector:  {},
              by_bedrijf: {},
              generated:  new Date().toISOString(),
            };

            projects.forEach(p => {
              stats.by_fase[p.status]   = (stats.by_fase[p.status]   || 0) + 1;
              stats.by_sector[p.sector] = (stats.by_sector[p.sector] || 0) + 1;
              stats.by_bedrijf[p.bedrijf] = (stats.by_bedrijf[p.bedrijf] || 0) + 1;
            });

            const output = { projects, stats };
            fs.writeFileSync('dashboard/data.json', JSON.stringify(output, null, 2));
            console.log(`Written ${projects.length} projects to dashboard/data.json`);

            core.setOutput('count', projects.length);

      - name: 💾 Commit bijgewerkte data
        run: |
          git config user.name  "TBI AI Bot"
          git config user.email "ai-bot@tbi.nl"
          git add dashboard/data.json
          git diff --staged --quiet || git commit -m "📊 Update dashboard data — ${{ steps.fetch-issues.outputs.count }} initiatieven [skip ci]"
          git push

      - name: 🚀 Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: dashboard/

  # ════════════════════════════════════════════════════════════════════════
  # JOB 3 — deploy-pages
  # Publiceert de in JOB 2 gebouwde artifact naar GitHub Pages.
  # ════════════════════════════════════════════════════════════════════════
  deploy-pages:
    name: Deploy GitHub Pages
    needs: update-dashboard
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
