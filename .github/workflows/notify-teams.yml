name: "📣 Teams Notificatie — Nieuw AI Initiatief"

on:
  issues:
    types: [opened]

permissions:
  issues: read
  contents: read

jobs:
  notify-new-initiatief:
    name: Notify Teams via Power Automate
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'

    steps:
      - name: "🔍 Parse issue"
        id: parse
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.issue.body || '';

            function extractField(body, label) {
              const regex = new RegExp(
                '###\\s+' + label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*\\n+([\\s\\S]*?)(?=\\n###|\\n---|$)',
                'i'
              );
              const m = (body).match(regex);
              return m ? m[1].trim().split('\n')[0].replace(/['"]/g,'') : '—';
            }

            const bedrijf     = extractField(body, 'TBI Bedrijf');
            const ambassadeur = extractField(body, 'Ambassadeur');
            const domein      = extractField(body, 'Primair domein');
            const fase        = extractField(body, 'PMC Startfase').split(' —')[0];
            const impact      = extractField(body, 'Verwachte impact').split(' —')[0];
            const doelstelling = extractField(body, 'Doelstelling').substring(0, 100);

            core.setOutput('bedrijf',      bedrijf);
            core.setOutput('ambassadeur',  ambassadeur);
            core.setOutput('domein',       domein);
            core.setOutput('fase',         fase);
            core.setOutput('impact',       impact);
            core.setOutput('doelstelling', doelstelling);
            core.setOutput('issue_url',    context.payload.issue.html_url);
            core.setOutput('issue_number', context.payload.issue.number.toString());
            core.setOutput('issue_title',  context.payload.issue.title.replace(/['"]/g,''));
            core.setOutput('indiener',     context.payload.issue.user.login);

      - name: "📣 Post naar Teams via Power Automate"
        run: |
          curl -s -X POST "${{ secrets.TEAMS_WEBHOOK_URI }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [{
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.2",
                  "body": [
                    {
                      "type": "Container",
                      "style": "emphasis",
                      "items": [
                        {
                          "type": "ColumnSet",
                          "columns": [
                            {
                              "type": "Column",
                              "width": "auto",
                              "items": [{
                                "type": "TextBlock",
                                "text": "🤖",
                                "size": "ExtraLarge"
                              }]
                            },
                            {
                              "type": "Column",
                              "width": "stretch",
                              "items": [
                                {
                                  "type": "TextBlock",
                                  "text": "Nieuw TBI AI Initiatief #${{ steps.parse.outputs.issue_number }}",
                                  "weight": "Bolder",
                                  "size": "Medium",
                                  "color": "Accent"
                                },
                                {
                                  "type": "TextBlock",
                                  "text": "${{ steps.parse.outputs.issue_title }}",
                                  "wrap": true,
                                  "spacing": "None"
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Bedrijf", "value": "${{ steps.parse.outputs.bedrijf }}" },
                        { "title": "Ambassadeur", "value": "${{ steps.parse.outputs.ambassadeur }}" },
                        { "title": "Domein", "value": "${{ steps.parse.outputs.domein }}" },
                        { "title": "PMC Fase", "value": "${{ steps.parse.outputs.fase }}" },
                        { "title": "Impact", "value": "${{ steps.parse.outputs.impact }}" },
                        { "title": "Ingediend door", "value": "${{ steps.parse.outputs.indiener }}" }
                      ]
                    },
                    {
                      "type": "TextBlock",
                      "text": "**Doelstelling:** ${{ steps.parse.outputs.doelstelling }}...",
                      "wrap": true,
                      "spacing": "Medium"
                    }
                  ],
                  "actions": [{
                    "type": "Action.OpenUrl",
                    "title": "📋 Bekijk initiatief op GitHub",
                    "url": "${{ steps.parse.outputs.issue_url }}"
                  }]
                }
              }]
            }'
