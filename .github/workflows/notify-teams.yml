name: "📣 Teams Notificatie — Nieuw AI Initiatief"

on:
  issues:
    types: [opened]

permissions:
  issues: read
  contents: read

jobs:
  notify-new-initiatief:
    name: Notify Teams via Power Automate
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'

    steps:
      - name: "🔍 Parse issue"
        id: parse
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.issue.body || '';

            function extractField(body, label) {
              const regex = new RegExp(
                '(?:^|\\n)###\\s+' + label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?=\\s|\\(|$|\\n)[^\\n]*\\n+([\\s\\S]*?)(?=\\n###|\\n---|$)',
                'i'
              );
              const m = (body).match(regex);
              return m ? m[1].trim().split('\n')[0] : '—';
            }

            const bedrijf     = extractField(body, 'TBI Bedrijf');
            const ambassadeur = extractField(body, 'Ambassadeur');
            const domein      = extractField(body, 'Primair domein');
            const fase        = extractField(body, 'PMC Startfase').split(' —')[0];
            const impact      = extractField(body, 'Verwachte impact').split(' —')[0];
            const doelstelling = extractField(body, 'Doelstelling').substring(0, 100);

            core.setOutput('bedrijf',      bedrijf);
            core.setOutput('ambassadeur',  ambassadeur);
            core.setOutput('domein',       domein);
            core.setOutput('fase',         fase);
            core.setOutput('impact',       impact);
            core.setOutput('doelstelling', doelstelling);
            core.setOutput('issue_url',    context.payload.issue.html_url);
            core.setOutput('issue_number', context.payload.issue.number.toString());
            core.setOutput('issue_title',  context.payload.issue.title);
            core.setOutput('indiener',     context.payload.issue.user.login);

      - name: "📣 Post naar Teams via Power Automate"
        env:
          ISSUE_NUMBER: ${{ steps.parse.outputs.issue_number }}
          ISSUE_TITLE:  ${{ steps.parse.outputs.issue_title }}
          BEDRIJF:      ${{ steps.parse.outputs.bedrijf }}
          AMBASSADEUR:  ${{ steps.parse.outputs.ambassadeur }}
          DOMEIN:       ${{ steps.parse.outputs.domein }}
          FASE:         ${{ steps.parse.outputs.fase }}
          IMPACT:       ${{ steps.parse.outputs.impact }}
          DOELSTELLING: ${{ steps.parse.outputs.doelstelling }}
          INDIENER:     ${{ steps.parse.outputs.indiener }}
          ISSUE_URL:    ${{ steps.parse.outputs.issue_url }}
          TEAMS_WEBHOOK_URI: ${{ secrets.TEAMS_WEBHOOK_URI }}
        run: |
          payload=$(jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title  "$ISSUE_TITLE" \
            --arg bedrijf      "$BEDRIJF" \
            --arg ambassadeur  "$AMBASSADEUR" \
            --arg domein       "$DOMEIN" \
            --arg fase         "$FASE" \
            --arg impact       "$IMPACT" \
            --arg doelstelling "$DOELSTELLING" \
            --arg indiener     "$INDIENER" \
            --arg issue_url    "$ISSUE_URL" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.2",
                  body: [
                    {
                      type: "Container",
                      style: "emphasis",
                      items: [{
                        type: "ColumnSet",
                        columns: [
                          {
                            type: "Column",
                            width: "auto",
                            items: [{ type: "TextBlock", text: "🤖", size: "ExtraLarge" }]
                          },
                          {
                            type: "Column",
                            width: "stretch",
                            items: [
                              { type: "TextBlock", text: "Nieuw TBI AI Initiatief #\($issue_number)", weight: "Bolder", size: "Medium", color: "Accent" },
                              { type: "TextBlock", text: $issue_title, wrap: true, spacing: "None" }
                            ]
                          }
                        ]
                      }]
                    },
                    {
                      type: "FactSet",
                      facts: [
                        { title: "Bedrijf",        value: $bedrijf },
                        { title: "Ambassadeur",    value: $ambassadeur },
                        { title: "Domein",         value: $domein },
                        { title: "PMC Fase",       value: $fase },
                        { title: "Impact",         value: $impact },
                        { title: "Ingediend door", value: $indiener }
                      ]
                    },
                    {
                      type: "TextBlock",
                      text: "**Doelstelling:** \($doelstelling)...",
                      wrap: true,
                      spacing: "Medium"
                    }
                  ],
                  actions: [{
                    type: "Action.OpenUrl",
                    title: "📋 Bekijk initiatief op GitHub",
                    url: $issue_url
                  }]
                }
              }]
            }')

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$TEAMS_WEBHOOK_URI"
